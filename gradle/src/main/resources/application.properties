spring.application.name=user-department-api

# MongoDB: set MONGODB_URI in production.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/user_department_api}

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8081}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Store only profile images here. Mount this directory as a Docker volume in production.
app.upload.dir=${APP_UPLOAD_DIR:uploads/users}

# Replace this default with a 32+ character secret before production deployment.
app.jwt.secret=${JWT_SECRET:replace-this-development-secret-with-a-long-random-value-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Comma-separated frontend origins.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081}

management.endpoints.web.exposure.include=health,info
